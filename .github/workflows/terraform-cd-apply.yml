name: CD - Cloudflare Origin CA Certificate (Apply)

on:
  workflow_dispatch:
    inputs:

      project_id:
        description: GCP project ID
        required: true
        type: string

      region:
        description: "GCP region (Free Tier: us-west1, us-central1, us-east1)"
        required: true
        type: string
        default: us-central1

      zone_id:
        description: Cloudflare Zone ID
        required: true
        type: string

      hostnames:
        description: hostnames
        required: true
        type: string

      request_type:
        description: request type
        required: true
        type: string

      requested_validity:
        description: requested validity
        required: true
        type: string

env:
  TF_BUCKET_NAME: ${{ secrets.TF_BUCKET_NAME }}
  TF_BUCKET_PREFIX: ${{ secrets.TF_BUCKET_PREFIX }}
  TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
jobs:
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Authenticate to GCP
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: latest
    - name: Ensure GCS State Bucket Exists
      run: |
        gcloud storage buckets describe gs://$TF_BUCKET_NAME --format="json" 2>/dev/null || \
        gcloud storage buckets create gs://$TF_BUCKET_NAME \
          --location=${{ github.event.inputs.region }} \
          --uniform-bucket-level-access
    - name: Terraform Init
      run: |
        terraform init \
          -backend-config="bucket=$TF_BUCKET_NAME" \
          -backend-config="prefix=$TF_BUCKET_PREFIX"
    - name: Terraform Plan
      run: |
        terraform plan  \
          -var="project_id=${{ github.event.inputs.project_id }}" \
          -var="region=${{ github.event.inputs.region }}" \
          -var="zone_id=${{ github.event.inputs.zone_id }}" \
          -var="hostnames=${{ github.event.inputs.hostnames }}" \
          -var="request_type=${{ github.event.inputs.request_type }}" \
          -var="requested_validity=${{ github.event.inputs.requested_validity }}"
    - name: Terraform Apply
      run: |
        terraform apply -auto-approve  \
          -var="project_id=${{ github.event.inputs.project_id }}" \
          -var="region=${{ github.event.inputs.region }}" \
          -var="zone_id=${{ github.event.inputs.zone_id }}" \
          -var="hostnames=${{ github.event.inputs.hostnames }}" \
          -var="request_type=${{ github.event.inputs.request_type }}" \
          -var="requested_validity=${{ github.event.inputs.requested_validity }}"
